<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>War Room — VoidForge (Redirecting)</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); color: var(--text); }
    .redirect-box { text-align: center; max-width: 420px; padding: 32px; }
    .redirect-box h1 { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
    .redirect-box p { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
    .redirect-box a { color: var(--accent); text-decoration: underline; font-size: 13px; }
  </style>
</head>
<body>
  <noscript><div class="noscript-msg">VoidForge requires JavaScript to run.</div></noscript>
  <div class="redirect-box" role="status">
    <h1>War Room</h1>
    <p id="redirect-message">Redirecting to project dashboard...</p>
    <p>This standalone page has been replaced by the project dashboard.<br>
    If you are not redirected, go to the <a href="/lobby.html">lobby</a>.</p>
  </div>
  <script src="war-room.js"></script>
</body>
</html>
